# wbs.schema.yaml
$schema: 'https://json-schema.org/draft/2020-12/schema'
$title: 'SpecDojo WBS (domain) schema'
$type: object
$comment: >
  Schema for domain-scoped WBS SSOT files:
  docs/ja/project-docs/<project_id>/020-プロジェクトスコープ/040-WBS/wbs-<domain>.yaml
  WBS is scope baseline: deliverables + done criteria. No schedule fields here.
  Domain is the stable ownership boundary; assigned_team is optional and may change over time.

additionalProperties: false

required:
  - version
  - project_id
  - domain
  - wbs

properties:
  version:
    type: integer
    minimum: 1
    description: 'Schema/data version.'

  project_id:
    type: string
    minLength: 1
    description: 'Project identifier (e.g., prj-sdh-ja-0001).'

  domain:
    type: string
    minLength: 1
    description: 'Stable ownership boundary used in file name wbs-<domain>.yaml (e.g., auth, billing, infra).'
    pattern: '^[a-z0-9][a-z0-9-]{0,62}$'

  assigned_team:
    type: string
    description: >
      Optional current team/org label responsible for this domain (may change).
      Keep for readability/reporting; do not use as a stable key.
    pattern: "^[^\\s].{0,127}$"

  wbs:
    type: array
    minItems: 1
    description: 'List of WBS elements under this domain.'
    items:
      $ref: '#/$defs/WbsItem'

$defs:
  Owner:
    type: string
    description: 'Document owner role. Extendable.'
    enum: ['BO', 'EN']

  Deliverable:
    type: object
    additionalProperties: false
    required: ['path']
    properties:
      path:
        type: string
        minLength: 1
        description: 'Repository path to SSOT deliverable (prefer product-docs or project-docs).'
        pattern: "^(.+/)?[^\\s]+$"
      note:
        type: string
        description: 'Optional note about the deliverable.'

  WbsItem:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - owner
      - done_criteria
    properties:
      id:
        type: string
        minLength: 1
        description: 'Globally unique WBS ID (recommended: WBS-<DOMAIN>-<NNN>).'
        pattern: '^WBS-[A-Z0-9]+-[0-9]{2,4}$'
      name:
        type: string
        minLength: 1
        description: 'WBS element name.'
      owner:
        $ref: '#/$defs/Owner'
      deliverables:
        type: array
        description: 'Deliverables produced by this WBS element.'
        items:
          $ref: '#/$defs/Deliverable'
      done_criteria:
        type: string
        minLength: 1
        description: 'Completion / acceptance criteria for this WBS element (scope, not schedule).'
      tags:
        type: array
        description: 'Optional tags for filtering/grouping.'
        items:
          type: string
          minLength: 1
      notes:
        type: string
        description: 'Optional free-form notes (keep concise; avoid duplicating product-docs SSOT).'
