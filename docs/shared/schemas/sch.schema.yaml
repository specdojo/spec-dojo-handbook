# sch.schema.yaml
$schema: 'https://json-schema.org/draft/2020-12/schema'
$title: 'SpecDojo Schedule (domain) schema'
$type: object
$comment: >
  Schema for domain-scoped schedule SSOT files:
  docs/ja/project-docs/<project_id>/040-プロジェクトマネジメント/020-スケジュール/sch-<domain>.yaml
  Used for CPM (critical path) calculation across merged domain schedules.
  Tasks + milestones form a DAG (no cycles). Cross-domain dependencies are allowed via depends_on IDs.

additionalProperties: false

required:
  - version
  - project_id
  - domain
  - calendar
  - settings
  - tasks

properties:
  version:
    type: integer
    minimum: 1
    description: 'Schema/data version.'

  project_id:
    type: string
    minLength: 1
    description: 'Project identifier (e.g., prj-sdh-ja-0001).'

  domain:
    type: string
    minLength: 1
    description: 'Stable ownership boundary used in file name sch-<domain>.yaml (e.g., auth, billing, infra).'
    pattern: '^[a-z0-9][a-z0-9-]{0,62}$'

  assigned_team:
    type: string
    description: >
      Optional current team/org label responsible for this domain (may change).
      Keep for readability/reporting; do not use as a stable key.
    pattern: "^[^\\s].{0,127}$"

  calendar:
    $ref: '#/$defs/Calendar'

  settings:
    $ref: '#/$defs/Settings'

  tasks:
    type: array
    minItems: 0
    description: 'Scheduled tasks. Duration-based (no fixed dates) for CPM friendliness.'
    items:
      $ref: '#/$defs/Task'

  milestones:
    type: array
    minItems: 0
    description: 'Milestones (duration=0). Typically gates/approvals. Optional.'
    items:
      $ref: '#/$defs/Milestone'

$defs:
  Owner:
    type: string
    description: 'Document owner role. Extendable.'
    enum: ['BO', 'EN']

  Id:
    type: string
    minLength: 1
    description: 'Globally unique identifier across all sch-*.yaml files.'
    # Allow flexible IDs; recommended conventions are enforced in tooling, not schema.
    pattern: '^[A-Za-z0-9][A-Za-z0-9_-]{1,63}$'

  Date:
    type: string
    format: date
    description: 'ISO date (YYYY-MM-DD).'

  Weekday:
    type: string
    enum: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']

  Calendar:
    type: object
    additionalProperties: false
    required: ['timezone', 'workdays']
    properties:
      timezone:
        type: string
        minLength: 1
        description: 'IANA timezone name (e.g., Asia/Tokyo).'
      workdays:
        type: array
        minItems: 1
        uniqueItems: true
        description: 'Working weekdays.'
        items:
          $ref: '#/$defs/Weekday'
      holidays:
        type: array
        description: 'Optional holiday dates excluded from workdays.'
        items:
          $ref: '#/$defs/Date'

  Settings:
    type: object
    additionalProperties: false
    required: ['start_date']
    properties:
      start_date:
        $ref: '#/$defs/Date'
      finish_milestone_id:
        $ref: '#/$defs/Id'
      notes:
        type: string
        description: 'Optional schedule-wide notes.'

  DependencyIds:
    type: array
    description: >
      List of predecessor IDs. These IDs may refer to tasks or milestones in ANY domain schedule file.
      The merged graph is validated by tooling (existence, no cycles).
    items:
      $ref: '#/$defs/Id'
    uniqueItems: true

  Task:
    type: object
    additionalProperties: false
    required:
      - id
      - wbs
      - name
      - duration_days
      - depends_on
      - owner
    properties:
      id:
        $ref: '#/$defs/Id'
      wbs:
        type: string
        minLength: 1
        description: 'WBS element ID this task contributes to (e.g., WBS-AUTH-010).'
        pattern: '^WBS-[A-Z0-9]+-[0-9]{2,4}$'
      name:
        type: string
        minLength: 1
        description: 'Task name.'
      duration_days:
        type: integer
        minimum: 0
        description: 'Task duration in working days. 0 is allowed but prefer milestones for 0.'
      depends_on:
        $ref: '#/$defs/DependencyIds'
      owner:
        $ref: '#/$defs/Owner'
      tags:
        type: array
        description: 'Optional tags for filtering/grouping.'
        items:
          type: string
          minLength: 1
      notes:
        type: string
        description: 'Optional free-form notes (keep concise).'

  Milestone:
    type: object
    additionalProperties: false
    required:
      - id
      - name
      - depends_on
    properties:
      id:
        $ref: '#/$defs/Id'
      name:
        type: string
        minLength: 1
        description: 'Milestone name.'
      depends_on:
        $ref: '#/$defs/DependencyIds'
      date_hint:
        $ref: '#/$defs/Date'
      tags:
        type: array
        items:
          type: string
          minLength: 1
      notes:
        type: string
        description: 'Optional notes.'
